<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KiTa Lummerland - Essensplanung</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>KiTa Lummerland</h1>
            <p class="subtitle">Essensplanung</p>
        </div>
        <nav id="main-nav">
            <button class="nav-btn active" data-view="wochenplan">Wochenplan</button>
            <button class="nav-btn" data-view="speisen">Speisen</button>
            <button class="nav-btn" data-view="kinder">Kinder &amp; Allergien</button>
            <button class="nav-btn" data-view="eltern">Eltern-Ansicht</button>
        </nav>
    </header>

    <main>
        <!-- Wochenplan Ansicht -->
        <section id="view-wochenplan" class="view active">
            <div class="view-header">
                <h2>Wochenplan</h2>
                <div class="week-nav">
                    <button id="prev-week" class="btn-icon" title="Vorherige Woche">&larr;</button>
                    <span id="current-week"></span>
                    <button id="next-week" class="btn-icon" title="Nächste Woche">&rarr;</button>
                </div>
            </div>
            <div id="variety-alert" class="alert hidden"></div>
            <div id="weekplan-grid" class="weekplan-grid"></div>
        </section>

        <!-- Speisen Verwaltung -->
        <section id="view-speisen" class="view">
            <div class="view-header">
                <h2>Speisen verwalten</h2>
                <button id="btn-add-meal" class="btn-primary">+ Neue Speise</button>
            </div>
            <div class="filter-bar">
                <button class="filter-btn active" data-filter="alle">Alle</button>
                <button class="filter-btn" data-filter="fleisch">Fleisch</button>
                <button class="filter-btn" data-filter="fisch">Fisch</button>
                <button class="filter-btn" data-filter="vegetarisch">Vegetarisch</button>
                <button class="filter-btn" data-filter="vegan">Vegan</button>
            </div>
            <div id="meals-list" class="meals-list"></div>
        </section>

        <!-- Kinder & Allergien -->
        <section id="view-kinder" class="view">
            <div class="view-header">
                <h2>Kinder &amp; Allergien</h2>
                <button id="btn-add-child" class="btn-primary">+ Kind hinzufügen</button>
            </div>
            <div id="children-list" class="children-list"></div>
        </section>

        <!-- Eltern-Ansicht -->
        <section id="view-eltern" class="view">
            <div class="view-header">
                <h2>Eltern-Ansicht</h2>
            </div>
            <div class="parent-login" id="parent-login">
                <p>Wählen Sie Ihr Kind aus, um den Speiseplan mit Allergie-Hinweisen zu sehen:</p>
                <select id="parent-child-select">
                    <option value="">-- Kind auswählen --</option>
                </select>
            </div>
            <div id="parent-weekplan" class="hidden">
                <div class="week-nav">
                    <button id="parent-prev-week" class="btn-icon">&larr;</button>
                    <span id="parent-current-week"></span>
                    <button id="parent-next-week" class="btn-icon">&rarr;</button>
                </div>
                <div id="parent-plan-grid" class="weekplan-grid"></div>
                <div id="child-allergies-info" class="allergy-info-box"></div>
            </div>
        </section>
    </main>

    <!-- Modal: Speise hinzufügen/bearbeiten -->
    <div id="modal-meal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-meal-title">Neue Speise</h3>
                <button class="modal-close">&times;</button>
            </div>
            <form id="form-meal">
                <label>Name der Speise
                    <input type="text" id="meal-name" required>
                </label>
                <label>Kategorie
                    <select id="meal-category" required>
                        <option value="fleisch">Fleisch</option>
                        <option value="fisch">Fisch</option>
                        <option value="vegetarisch">Vegetarisch</option>
                        <option value="vegan">Vegan</option>
                    </select>
                </label>
                <fieldset>
                    <legend>Enthaltene Allergene</legend>
                    <div class="allergen-checkboxes" id="meal-allergens"></div>
                </fieldset>
                <label>Beschreibung (optional)
                    <textarea id="meal-description" rows="2"></textarea>
                </label>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary modal-cancel">Abbrechen</button>
                    <button type="submit" class="btn-primary">Speichern</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal: Kind hinzufügen/bearbeiten -->
    <div id="modal-child" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-child-title">Kind hinzufügen</h3>
                <button class="modal-close">&times;</button>
            </div>
            <form id="form-child">
                <label>Vorname
                    <input type="text" id="child-firstname" required>
                </label>
                <label>Nachname
                    <input type="text" id="child-lastname" required>
                </label>
                <label>Gruppe
                    <input type="text" id="child-group" placeholder="z.B. Sonnenschein">
                </label>
                <fieldset>
                    <legend>Allergien / Unverträglichkeiten</legend>
                    <div class="allergen-checkboxes" id="child-allergens"></div>
                </fieldset>
                <label>Sonstige Hinweise
                    <textarea id="child-notes" rows="2" placeholder="z.B. kein Schweinefleisch"></textarea>
                </label>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary modal-cancel">Abbrechen</button>
                    <button type="submit" class="btn-primary">Speichern</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal: Speise für Tag auswählen -->
    <div id="modal-pick-meal" class="modal hidden">
        <div class="modal-content modal-wide">
            <div class="modal-header">
                <h3 id="modal-pick-title">Speise auswählen</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="filter-bar">
                <button class="pick-filter-btn active" data-filter="alle">Alle</button>
                <button class="pick-filter-btn" data-filter="fleisch">Fleisch</button>
                <button class="pick-filter-btn" data-filter="fisch">Fisch</button>
                <button class="pick-filter-btn" data-filter="vegetarisch">Vegetarisch</button>
                <button class="pick-filter-btn" data-filter="vegan">Vegan</button>
            </div>
            <div id="pick-meals-list" class="meals-list pick-list"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
